version: 0.0
os: linux

files:
  - source: app.jar
    destination: /home/ubuntu/app

file_exists_behavior: OVERWRITE

permissions:
  - object: /home/ubuntu/app/app.jar
    owner: ubuntu
    group: ubuntu
    mode: 644
    type:
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: root
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 60
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: root
