<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kinoton 신규 영업 사이트 등록</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="content">
        <header th:replace="~{fragments/layout :: header}"></header>

        <nav class="breadcrumb" aria-label="현재 위치">
            <a th:href="@{/opportunities}">영업 사이트 리스트</a>
            <span>신규 등록</span>
        </nav>

        <section class="page-title">
            <div>
                <h1>신규 영업 사이트 등록</h1>
                <p>기본 정보를 등록하면 초기 영업 진행 기록이 함께 생성됩니다.</p>
            </div>
        </section>

        <section class="form-panel create-form-panel">
            <form th:action="@{/opportunities}" th:object="${createRequest}" method="post" class="management-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <p th:if="${errorMessage}" class="form-error" th:text="${errorMessage}">등록 오류</p>

                <div class="form-grid">
                    <label>
                        <span>사업본부</span>
                        <select th:field="*{departmentCode}" required>
                            <option value="">선택</option>
                            <option th:each="department : ${departments}"
                                    th:value="${department.code}"
                                    th:text="${department.name}">
                                DE 사업본부
                            </option>
                        </select>
                    </label>
                    <label>
                        <span>고객사명</span>
                        <input type="text" th:field="*{customerName}" placeholder="예: CJ CGV" required>
                    </label>
                    <label>
                        <span>담당자명</span>
                        <input type="text" th:field="*{ownerName}" placeholder="예: 배우성" required>
                    </label>
                </div>

                <div class="form-grid">
                    <label>
                        <span>사업명</span>
                        <input type="text" th:field="*{projectName}" placeholder="예: CGV 영등포 돔 프로젝트" required>
                    </label>
                    <label>
                        <span>예상발주시기</span>
                        <input type="text" th:field="*{expectedOrderPeriod}" placeholder="예: 2026 4Q">
                    </label>
                    <label>
                        <span>예상구축시기</span>
                        <input type="text" th:field="*{expectedDeliveryPeriod}" placeholder="예: 2027 2Q">
                    </label>
                </div>

                <div class="form-grid compact">
                    <label>
                        <span>사업총액(억원, VAT별도)</span>
                        <input type="number" step="0.01" min="0" th:field="*{projectAmount}" placeholder="예: 28.0" required>
                    </label>
                    <label>
                        <span>초기 수주확률</span>
                        <input type="number" min="0" max="100" th:field="*{probability}" placeholder="예: 10" required>
                    </label>
                    <div class="helper-card">
                        <strong>입력 기준</strong>
                        <span>초기 수주확률은 선택한 사업본부의 수주확률 설정에 등록된 값이어야 합니다.</span>
                    </div>
                </div>

                <div class="settings-actions">
                    <a class="secondary-action" th:href="@{/opportunities}">취소</a>
                    <button type="submit" class="primary-action">등록</button>
                </div>
            </form>
        </section>

        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </main>
</div>
</body>
</html>
