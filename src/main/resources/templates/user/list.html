<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Kinoton 회원 관리</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="content">
        <header th:replace="~{fragments/layout :: header}"></header>

        <section class="page-title">
            <div>
                <h1>회원 관리</h1>
                <p>사용자 계정과 역할, 사업본부 접근 권한을 관리합니다.</p>
            </div>
        </section>

        <p th:if="${message}" class="form-message" th:text="${message}">저장되었습니다.</p>

        <section class="management-panel">
            <h2>신규 사용자 등록</h2>
            <form th:action="@{/users}" th:object="${createRequest}" method="post" class="management-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <label>
                        <span>이메일</span>
                        <input type="email" th:field="*{email}" required>
                    </label>
                    <label>
                        <span>이름</span>
                        <input type="text" th:field="*{name}" required>
                    </label>
                    <label>
                        <span>초기 비밀번호</span>
                        <input type="password" th:field="*{password}" required>
                    </label>
                </div>

                <div class="checkbox-grid">
                    <label class="inline-check">
                        <input type="checkbox" th:field="*{active}">
                        <span>활성</span>
                    </label>
                    <label class="inline-check">
                        <input type="checkbox" th:field="*{passwordResetRequired}">
                        <span>비밀번호 변경 필요</span>
                    </label>
                </div>

                <div class="permission-section">
                    <h3>역할</h3>
                    <div class="checkbox-grid">
                        <label class="inline-check" th:each="role : ${roles}">
                            <input type="checkbox" th:field="*{roleCodes}" th:value="${role.code}">
                            <span th:text="${role.name}">관리자</span>
                        </label>
                    </div>
                </div>

                <div class="permission-section">
                    <h3>사업본부 권한</h3>
                    <div class="permission-grid">
                        <div class="permission-row" th:each="department : ${departments}">
                            <strong th:text="${department.name}">DE 사업본부</strong>
                            <label class="inline-check">
                                <input type="checkbox" th:field="*{readableDepartmentCodes}" th:value="${department.code}">
                                <span>읽기</span>
                            </label>
                            <label class="inline-check">
                                <input type="checkbox" th:field="*{writableDepartmentCodes}" th:value="${department.code}">
                                <span>쓰기</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="settings-actions">
                    <button type="submit" class="primary-action">등록</button>
                </div>
            </form>
        </section>

        <section class="table-panel user-table-panel">
            <table>
                <thead>
                <tr>
                    <th>이메일</th>
                    <th>이름</th>
                    <th>역할</th>
                    <th>사업본부 권한</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.email}">admin@kinoton.local</td>
                    <td th:text="${user.name}">관리자</td>
                    <td th:text="${#strings.isEmpty(user.roleNames) ? '-' : user.roleNames}">관리자</td>
                    <td th:text="${#strings.isEmpty(user.departmentPermissionSummary) ? '-' : user.departmentPermissionSummary}">DE 사업본부</td>
                    <td>
                        <span class="stage-chip" th:text="${user.active ? '활성' : '비활성'}">활성</span>
                        <span class="stage-chip" th:if="${user.passwordResetRequired}">비밀번호 변경</span>
                    </td>
                    <td>
                        <a class="table-link" th:href="@{/users/{id}(id=${user.userId})}">수정</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" class="empty-cell">등록된 사용자가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </section>

        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </main>
</div>
</body>
</html>
