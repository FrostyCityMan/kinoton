<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Kinoton 회원가입</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<main class="login-panel">
    <div class="login-brand">
        <img class="brand-logo login-logo" th:src="@{/images/kinoton-logo.jpg}" alt="Kinoton Imagineering Company">
        <span>영업 관리 시스템</span>
    </div>
    <form th:action="@{/signup}" th:object="${signupRequest}" method="post" class="login-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <h1>회원가입</h1>
        <p class="helper-text">가입 신청 후 관리자가 계정을 활성화하고 역할과 본부 권한을 부여합니다.</p>
        <p th:if="${errorMessage}" class="form-error" th:text="${errorMessage}">가입 오류</p>

        <label for="email">이메일</label>
        <input id="email" th:field="*{email}" type="email" autocomplete="username" required>
        <p th:if="${#fields.hasErrors('email')}" class="form-error" th:errors="*{email}">이메일 오류</p>

        <label for="name">이름</label>
        <input id="name" th:field="*{name}" type="text" autocomplete="name" required>
        <p th:if="${#fields.hasErrors('name')}" class="form-error" th:errors="*{name}">이름 오류</p>

        <label for="password">비밀번호</label>
        <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required>
        <p th:if="${#fields.hasErrors('password')}" class="form-error" th:errors="*{password}">비밀번호 오류</p>

        <label for="passwordConfirm">비밀번호 확인</label>
        <input id="passwordConfirm" th:field="*{passwordConfirm}" type="password" autocomplete="new-password" required>
        <p th:if="${#fields.hasErrors('passwordConfirm')}" class="form-error" th:errors="*{passwordConfirm}">비밀번호 확인 오류</p>

        <button type="submit">가입 신청</button>
        <div class="login-links">
            <a th:href="@{/login}">로그인으로 돌아가기</a>
        </div>
    </form>
</main>
</body>
</html>
