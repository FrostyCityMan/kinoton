<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="app-header">
    <div>
        <img class="brand-logo header-logo" th:src="@{/images/kinoton-logo.jpg}" alt="Kinoton Imagineering Company">
        <span class="subtitle">영업 관리 시스템</span>
    </div>
    <nav class="top-nav" aria-label="상단 메뉴">
        <a th:href="@{/dashboard}">대시보드</a>
        <a th:href="@{/opportunities}">영업 사이트</a>
        <a th:href="@{/probability-stages}">수주확률 설정</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-button">로그아웃</button>
        </form>
    </nav>
</header>

<aside th:fragment="sidebar" class="sidebar">
    <div class="sidebar-brand">
        <img class="brand-logo sidebar-logo" th:src="@{/images/kinoton-logo.jpg}" alt="Kinoton Imagineering Company">
        <span>영업 관리 시스템</span>
    </div>
    <nav aria-label="계약 범위 메뉴">
        <a class="active" th:href="@{/dashboard}">대시보드</a>
        <a th:href="@{/opportunities/new}">영업 사이트 등록</a>
        <a th:href="@{/opportunities}">영업 사이트 리스트</a>
        <a th:href="@{/departments}">사업본부 관리</a>
        <a th:href="@{/employees}">직원 마스터</a>
        <a th:href="@{/probability-stages}">수주확률 설정</a>
        <a th:href="@{/reports}">보고서/인쇄</a>
        <a th:href="@{/users}">회원/권한 관리</a>
        <a th:href="@{/access-logs}">접속 로그</a>
        <a th:href="@{/audit-logs}">감사 로그</a>
    </nav>
</aside>

<footer th:fragment="footer" class="app-footer">
    <span>키노톤주식회사 영업 관리 시스템</span>
</footer>
</body>
</html>
