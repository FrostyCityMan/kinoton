<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kinoton 직원 마스터</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="content">
        <header th:replace="~{fragments/layout :: header}"></header>

        <section class="page-title">
            <div>
                <h1>직원 마스터</h1>
                <p>영업 사이트 담당자 선택에 사용할 전체 직원 기준 데이터를 관리합니다.</p>
            </div>
        </section>

        <p th:if="${message}" class="form-message" th:text="${message}">저장되었습니다.</p>

        <section class="management-panel">
            <h2>신규 직원 등록</h2>
            <form th:action="@{/employees}" th:object="${createRequest}" method="post" class="management-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <p th:if="${errorMessage}" class="form-error" th:text="${errorMessage}">등록 오류</p>

                <div class="form-grid">
                    <label>
                        <span>사업본부</span>
                        <select th:field="*{departmentCode}" required>
                            <option value="">선택</option>
                            <option th:each="department : ${departments}"
                                    th:value="${department.code}"
                                    th:text="${department.name}">
                                DE 사업본부
                            </option>
                        </select>
                    </label>
                    <label>
                        <span>직원명</span>
                        <input type="text" th:field="*{name}" placeholder="예: 배우성" required>
                    </label>
                    <label>
                        <span>직위/역할</span>
                        <input type="text" th:field="*{positionName}" placeholder="예: 영업 담당">
                    </label>
                </div>

                <div class="form-grid">
                    <label>
                        <span>이메일</span>
                        <input type="email" th:field="*{email}" placeholder="예: user@kinoton.local">
                    </label>
                    <label>
                        <span>연락처</span>
                        <input type="text" th:field="*{phone}" placeholder="예: 010-0000-0000">
                    </label>
                    <label class="inline-check form-checkline">
                        <input type="checkbox" th:field="*{active}">
                        <span>활성</span>
                    </label>
                </div>

                <div class="settings-actions">
                    <button type="submit" class="primary-action">등록</button>
                </div>
            </form>
        </section>

        <section class="table-panel user-table-panel">
            <table>
                <thead>
                <tr>
                    <th>직원명</th>
                    <th>사업본부</th>
                    <th>직위/역할</th>
                    <th>이메일</th>
                    <th>연락처</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="employee : ${employees}">
                    <td th:text="${employee.name}">배우성</td>
                    <td th:text="${employee.departmentName}">DE 사업본부</td>
                    <td th:text="${employee.positionName ?: '-'}">영업 담당</td>
                    <td th:text="${employee.email ?: '-'}">user@kinoton.local</td>
                    <td th:text="${employee.phone ?: '-'}">010-0000-0000</td>
                    <td>
                        <span class="stage-chip" th:text="${employee.active ? '활성' : '비활성'}">활성</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="6" class="empty-cell">등록된 직원이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </section>

        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </main>
</div>
</body>
</html>
