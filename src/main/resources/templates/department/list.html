<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kinoton 사업본부 관리</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <main class="content">
        <header th:replace="~{fragments/layout :: header}"></header>

        <section class="page-title">
            <div>
                <h1>사업본부 관리</h1>
                <p>영업 사이트, 담당자, 회원 권한에서 사용하는 사업본부 기준 데이터를 관리합니다.</p>
            </div>
        </section>

        <p th:if="${message}" class="form-message" th:text="${message}">저장되었습니다.</p>
        <p th:if="${errorMessage}" class="form-error" th:text="${errorMessage}">처리 오류</p>

        <section class="management-panel">
            <h2>신규 사업본부 등록</h2>
            <form th:action="@{/departments}" th:object="${createRequest}" method="post" class="management-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <label>
                        <span>사업본부 코드</span>
                        <input type="text" th:field="*{code}" placeholder="예: DE" required>
                    </label>
                    <label>
                        <span>사업본부명</span>
                        <input type="text" th:field="*{name}" placeholder="예: DE 사업본부" required>
                    </label>
                    <label>
                        <span>정렬순서</span>
                        <input type="number" th:field="*{displayOrder}" min="0" required>
                    </label>
                </div>

                <div class="checkbox-grid">
                    <label class="inline-check">
                        <input type="checkbox" th:field="*{active}">
                        <span>활성</span>
                    </label>
                </div>

                <div class="helper-card">
                    <strong>삭제 기준</strong>
                    <span>사업본부는 영업 사이트와 권한 데이터에서 참조되므로 물리 삭제하지 않고 비활성화합니다. 비활성 사업본부는 신규 등록 선택 목록에서 제외됩니다.</span>
                </div>

                <div class="settings-actions">
                    <button type="submit" class="primary-action">등록</button>
                </div>
            </form>
        </section>

        <section class="table-panel user-table-panel">
            <table>
                <thead>
                <tr>
                    <th>코드</th>
                    <th>사업본부명</th>
                    <th>정렬순서</th>
                    <th>참조 현황</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="department : ${departments}">
                    <td th:text="${department.code}">DE</td>
                    <td th:text="${department.name}">DE 사업본부</td>
                    <td th:text="${department.displayOrder}">1</td>
                    <td>
                        <span class="summary-chip" th:text="'영업 ' + ${department.opportunityCount}">영업 0</span>
                        <span class="summary-chip" th:text="'직원 ' + ${department.employeeCount}">직원 0</span>
                        <span class="summary-chip" th:text="'권한 ' + ${department.userPermissionCount}">권한 0</span>
                    </td>
                    <td>
                        <span class="stage-chip" th:text="${department.active ? '활성' : '비활성'}">활성</span>
                    </td>
                    <td>
                        <div class="table-actions">
                            <a class="table-link" th:href="@{/departments/{id}(id=${department.departmentId})}">수정</a>
                            <form th:if="${department.active}"
                                  th:action="@{/departments/{id}/delete(id=${department.departmentId})}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="danger-action">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(departments)}">
                    <td colspan="6" class="empty-cell">등록된 사업본부가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </section>

        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </main>
</div>
</body>
</html>
