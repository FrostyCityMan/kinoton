name: Deploy dev

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: kinoton
  DEPLOY_ENV: dev
  DEPLOY_BUNDLE: kinoton-dev-${{ github.sha }}.zip
  DEPLOY_KEY: kinoton/dev/${{ github.sha }}.zip

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Print workflow context
        run: |
          set -euo pipefail
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Runner OS: ${RUNNER_OS}"
          java -version

      - name: Build
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean test bootJar --console=plain --stacktrace
          echo "::group::build/libs"
          ls -lah build/libs
          echo "::endgroup::"

      - name: Package CodeDeploy bundle
        run: |
          set -euo pipefail
          BOOT_JAR="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | sort | head -n 1)"
          if [ -z "$BOOT_JAR" ]; then
            echo "No Spring Boot jar found under build/libs." >&2
            exit 1
          fi

          rm -rf build/codedeploy
          mkdir -p build/codedeploy/scripts

          cp "$BOOT_JAR" build/codedeploy/app.jar
          cp appspec.yml build/codedeploy/appspec.yml
          cp scripts/start.sh scripts/stop.sh scripts/validate.sh build/codedeploy/scripts/
          chmod +x build/codedeploy/scripts/*.sh

          cd build/codedeploy
          zip -r "../${DEPLOY_BUNDLE}" .
          cd ../..

          echo "::group::CodeDeploy bundle"
          ls -lah "build/${DEPLOY_BUNDLE}"
          unzip -l "build/${DEPLOY_BUNDLE}"
          sha256sum "build/${DEPLOY_BUNDLE}"
          echo "::endgroup::"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Print AWS deployment context
        run: |
          set -euo pipefail
          echo "::group::AWS identity"
          aws sts get-caller-identity --query '{Account:Account,Arn:Arn}' --output table
          echo "::endgroup::"

          echo "::group::S3 bucket"
          aws s3api head-bucket --bucket "${{ vars.AWS_DEPLOY_BUCKET }}"
          echo "Bucket: ${{ vars.AWS_DEPLOY_BUCKET }}"
          echo "Deploy key: ${DEPLOY_KEY}"
          echo "::endgroup::"

          echo "::group::CodeDeploy deployment group"
          aws deploy get-deployment-group \
            --application-name "${{ vars.AWS_CODEDEPLOY_APPLICATION }}" \
            --deployment-group-name "${{ vars.AWS_CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --query 'deploymentGroupInfo.{deploymentGroupName:deploymentGroupName,deploymentConfigName:deploymentConfigName,ec2TagFilters:ec2TagFilters,autoScalingGroups:autoScalingGroups,serviceRoleArn:serviceRoleArn}' \
            --output json
          echo "::endgroup::"

      - name: Upload bundle to S3
        run: |
          set -euo pipefail
          aws s3 cp "build/${DEPLOY_BUNDLE}" "s3://${{ vars.AWS_DEPLOY_BUCKET }}/${DEPLOY_KEY}"
          echo "::group::Uploaded S3 object"
          aws s3api head-object \
            --bucket "${{ vars.AWS_DEPLOY_BUCKET }}" \
            --key "${DEPLOY_KEY}" \
            --query '{ContentLength:ContentLength,ETag:ETag,LastModified:LastModified,VersionId:VersionId}' \
            --output json
          echo "::endgroup::"

      - name: Create CodeDeploy deployment
        id: deploy
        run: |
          set -euo pipefail
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${{ vars.AWS_CODEDEPLOY_APPLICATION }}" \
            --deployment-group-name "${{ vars.AWS_CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --description "kinoton dev ${GITHUB_SHA}" \
            --s3-location bucket=${{ vars.AWS_DEPLOY_BUCKET }},key=${DEPLOY_KEY},bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query deploymentId \
            --output text)"

          echo "deployment-id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployment ID: ${DEPLOYMENT_ID}"

          echo "::group::Created deployment"
          aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.{deploymentId:deploymentId,status:status,creator:creator,applicationName:applicationName,deploymentGroupName:deploymentGroupName,revision:revision,createTime:createTime}' \
            --output json
          echo "::endgroup::"

      - name: Wait for deployment
        run: |
          set -euo pipefail
          DEPLOYMENT_ID="${{ steps.deploy.outputs.deployment-id }}"

          set +e
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"
          WAIT_STATUS="$?"
          set -e

          echo "::group::Deployment summary"
          aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.{deploymentId:deploymentId,status:status,errorInformation:errorInformation,creator:creator,createTime:createTime,completeTime:completeTime}' \
            --output json
          echo "::endgroup::"

          INSTANCE_IDS="$(aws deploy list-deployment-instances \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'instancesList[]' \
            --output text || true)"

          echo "::group::Deployment instances"
          if [ -z "${INSTANCE_IDS}" ]; then
            echo "No deployment instances returned."
          else
            for INSTANCE_ID in ${INSTANCE_IDS}; do
              echo "Instance: ${INSTANCE_ID}"
              aws deploy get-deployment-instance \
                --deployment-id "${DEPLOYMENT_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query 'instanceSummary.{instanceId:instanceId,status:status,lastUpdatedAt:lastUpdatedAt,lifecycleEvents:lifecycleEvents}' \
                --output json || true
            done
          fi
          echo "::endgroup::"

          if [ "${WAIT_STATUS}" -ne 0 ]; then
            echo "::group::EC2 runtime diagnostics"
            for INSTANCE_ID in ${INSTANCE_IDS}; do
              echo "Collecting diagnostics from ${INSTANCE_ID}"
              COMMAND_ID="$(aws ssm send-command \
                --instance-ids "${INSTANCE_ID}" \
                --document-name AWS-RunShellScript \
                --comment "kinoton deployment diagnostics ${DEPLOYMENT_ID}" \
                --parameters 'commands=[
                  "set +e",
                  "echo INSTANCE",
                  "curl -s http://169.254.169.254/latest/meta-data/instance-id || true",
                  "echo APP_DIR",
                  "ls -la /home/ubuntu/app || true",
                  "echo APP_ENV_KEYS",
                  "if [ -f /home/ubuntu/app/app.env ]; then cut -d= -f1 /home/ubuntu/app/app.env; fi",
                  "echo PROCESS",
                  "ps -ef | grep java | grep -v grep || true",
                  "echo PORTS",
                  "ss -ltnp | grep 8080 || true",
                  "echo HEALTH",
                  "SERVER_PORT_VALUE=$(awk -F= '\''/^SERVER_PORT=/ {print $2; exit}'\'' /home/ubuntu/app/app.env 2>/dev/null); SERVER_PORT_VALUE=${SERVER_PORT_VALUE:-8080}; curl -i http://127.0.0.1:${SERVER_PORT_VALUE}/actuator/health || true",
                  "echo APP_LOG",
                  "tail -n 160 /home/ubuntu/app/app.log || true",
                  "echo CODEDEPLOY_AGENT_LOG",
                  "sudo tail -n 120 /var/log/aws/codedeploy-agent/codedeploy-agent.log || true",
                  "echo CODEDEPLOY_DEPLOYMENT_LOG",
                  "sudo tail -n 200 /opt/codedeploy-agent/deployment-root/deployment-logs/codedeploy-agent-deployments.log || true"
                ]' \
                --query 'Command.CommandId' \
                --output text || true)"

              if [ -n "${COMMAND_ID}" ] && [ "${COMMAND_ID}" != "None" ]; then
                aws ssm wait command-executed \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" || true

                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
                  --output json || true
              fi
            done
            echo "::endgroup::"
            exit "${WAIT_STATUS}"
          fi

          echo "::group::EC2 post-deployment health"
          for INSTANCE_ID in ${INSTANCE_IDS}; do
            echo "Checking ${INSTANCE_ID}"
            COMMAND_ID="$(aws ssm send-command \
              --instance-ids "${INSTANCE_ID}" \
              --document-name AWS-RunShellScript \
              --comment "kinoton post-deployment health ${DEPLOYMENT_ID}" \
              --parameters 'commands=[
                "set +e",
                "echo APP_DIR",
                "ls -la /home/ubuntu/app || true",
                "echo PROCESS",
                "ps -ef | grep java | grep -v grep || true",
                "echo PORTS",
                "ss -ltnp | grep 8080 || true",
                "echo HEALTH",
                "SERVER_PORT_VALUE=$(awk -F= '\''/^SERVER_PORT=/ {print $2; exit}'\'' /home/ubuntu/app/app.env 2>/dev/null); SERVER_PORT_VALUE=${SERVER_PORT_VALUE:-8080}; curl -i http://127.0.0.1:${SERVER_PORT_VALUE}/actuator/health || true",
                "echo APP_LOG",
                "tail -n 80 /home/ubuntu/app/app.log || true"
              ]' \
              --query 'Command.CommandId' \
              --output text || true)"

            if [ -n "${COMMAND_ID}" ] && [ "${COMMAND_ID}" != "None" ]; then
              aws ssm wait command-executed \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" || true

              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${INSTANCE_ID}" \
                --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
                --output json || true
            fi
          done
          echo "::endgroup::"

          echo "Deployment succeeded: ${DEPLOYMENT_ID}"
